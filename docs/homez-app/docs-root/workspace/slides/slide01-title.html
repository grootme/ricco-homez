<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1a1a2e; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.logo-bar {
  position: absolute; top: 30pt; left: 40pt; right: 40pt;
  display: flex; justify-content: space-between; align-items: center;
}
.badge {
  background: #e94560; padding: 8pt 20pt; border-radius: 20pt;
}
.badge p {
  color: #ffffff; font-size: 11pt; font-weight: bold; margin: 0;
  text-transform: uppercase; letter-spacing: 1pt;
}
.title-area {
  text-align: center; margin-bottom: 30pt;
}
h1 {
  color: #ffffff; font-size: 42pt; font-weight: bold; margin: 0 0 15pt 0;
  letter-spacing: -1pt;
}
.subtitle {
  color: #e94560; font-size: 20pt; font-weight: bold; margin: 0 0 20pt 0;
}
.description p {
  color: #a0a0a0; font-size: 14pt; margin: 0; max-width: 500pt;
  text-align: center; line-height: 1.5;
}
.footer {
  position: absolute; bottom: 30pt; left: 40pt; right: 40pt;
  display: flex; justify-content: space-between; align-items: center;
}
.url p {
  color: #6c757d; font-size: 11pt; margin: 0;
}
.author p {
  color: #6c757d; font-size: 11pt; margin: 0;
}
</style>
</head>
<body>
<div class="logo-bar">
  <div class="badge"><p>Premium Template</p></div>
</div>
<div class="title-area">
  <h1>Homez</h1>
  <p class="subtitle">Real Estate React NextJS Template Analysis</p>
</div>
<div class="description">
  <p>A comprehensive analysis of Homez - a modern designed real estate template for building professional property listing websites</p>
</div>
<div class="footer">
  <div class="url"><p>ThemeForest: item/47704622</p></div>
  <div class="author"><p>Analysis for RICCO Real Estate</p></div>
</div>
</body>
</html>
