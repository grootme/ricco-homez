<!DOCTYPE html>
<html>
<head>
<style>

body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #162235; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center;
}
.content {
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
}
h1 { color: #FFFFFF; font-size: 42pt; margin: 0 0 10pt 0; }
h2 { color: #37DCF2; font-size: 24pt; margin: 0 0 20pt 0; font-weight: normal; }
.subtitle { color: #FFFFFF; font-size: 16pt; opacity: 0.8; margin: 0; }
.logo-box {
  background: #37DCF2; border-radius: 8pt;
  padding: 15pt 30pt; margin-bottom: 30pt;
}
.logo-box p { color: #162235; font-size: 18pt; font-weight: bold; margin: 0; }
</style>
</head>
<body>
<div class="content">
  <div class="logo-box">
    <p>HOMEZ TEMPLATE</p>
  </div>
  <h1>Análisis Detallado</h1>
  <h2>Real Estate React NextJS Template</h2>

</html>
